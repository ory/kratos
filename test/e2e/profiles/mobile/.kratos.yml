selfservice:
  flows:
    settings:
      privileged_session_max_age: 5m
      required_aal: aal1

    logout:
      after:
        default_browser_return_url: http://localhost:4455/login

    registration:
      enable_legacy_one_step: true
      after:
        password:
          hooks:
            - hook: session
        oidc:
          hooks:
            - hook: session
    recovery:
      enabled: true

    verification:
      enabled: false
  methods:
    totp:
      enabled: true
      config:
        issuer: issuer.ory.sh
    lookup_secret:
      enabled: true
    webauthn:
      enabled: true
      config:
        rp:
          id: localhost
          origin: http://localhost:4455
          display_name: Ory
    oidc:
      enabled: true
      config:
        providers:
          - id: hydra
            label: Ory
            provider: generic
            client_id: ${OIDC_HYDRA_CLIENT_ID}
            client_secret: ${OIDC_HYDRA_CLIENT_SECRET}
            issuer_url: http://localhost:4444/
            scope:
              - offline
            mapper_url: file://test/e2e/profiles/oidc/hydra.jsonnet
          - id: google
            provider: generic
            client_id: ${OIDC_GOOGLE_CLIENT_ID}
            client_secret: ${OIDC_GOOGLE_CLIENT_SECRET}
            issuer_url: http://localhost:4444/
            scope:
              - offline
            mapper_url: file://test/e2e/profiles/oidc/hydra.jsonnet
          - id: github
            provider: generic
            client_id: ${OIDC_GITHUB_CLIENT_ID}
            client_secret: ${OIDC_GITHUB_CLIENT_SECRET}
            issuer_url: http://localhost:4444/
            scope:
              - offline
            mapper_url: file://test/e2e/profiles/oidc/hydra.jsonnet

identity:
  schemas:
    - id: default
      url: file://test/e2e/profiles/email/identity.traits.schema.json

secrets:
  cipher:
    - secret-thirty-two-character-long

session:
  whoami:
    required_aal: aal1
