version: v0.13.0

dsn: memory

serve:
  public:
    base_url: http://127.0.0.1:4433/
    cors:
      enabled: true
  admin:
    base_url: http://kratos:4434/

selfservice:
  default_browser_return_url: http://127.0.0.1:4455/welcome
  allowed_return_urls:
    - http://127.0.0.1:4455
    - http://localhost:19006/Callback
    - exp://localhost:8081/--/Callback

  methods:
    password:
      enabled: true
    totp:
      config:
        issuer: Kratos
      enabled: true
    lookup_secret:
      enabled: true
    link:
      enabled: true
    code:
      enabled: true
    # OIDC: Replace client_id/client_secret with your app credentials from Google Cloud Console and PayPal Developer Dashboard.
    # Add this callback URL in each IdP: <serve.public.base_url>/self-service/methods/oidc/callback/<provider_id>
    # e.g. http://127.0.0.1:4433/self-service/methods/oidc/callback/google and .../callback/paypal
    oidc:
      enabled: true
      config:
        providers:
          - id: paypal
            provider: generic
            label: "PayPal"
            client_id: AX2p8_qt8U8OUbKmO2BN2hEI13COGHJakoVX-Kb-vDkKq5fsDv7zib436NZ1vfPheRm6Jh3SsNGDRvjN
            client_secret: EMBIZ3Cdbrz2PIn9lJbVNaEj_9KqLs5P3hX5urEKUMSpDyT471sGi9TA-QeXJ31aXZ6s-HzRDMVnQ_2c
            scope:
              - openid
              - email
            requested_claims:
              id_token:
                email:
                  essential: true
                email_verified:
                  essential: true
            issuer_url: https://b5755142-d32e-4e05-898f-cf0bf7632d20.mock.pstmn.io
            userinfo_url: https://api.sandbox.paypal.com/v1/identity/openidconnect/userinfo?schema=openid
            mapper_url: "base64:"

  flows:
    error:
      ui_url: http://127.0.0.1:4455/error

    settings:
      ui_url: http://127.0.0.1:4455/settings
      privileged_session_max_age: 15m
      required_aal: highest_available

    recovery:
      enabled: true
      ui_url: http://127.0.0.1:4455/recovery
      use: code

    verification:
      enabled: true
      ui_url: http://127.0.0.1:4455/verification
      use: code
      after:
        default_browser_return_url: http://127.0.0.1:4455/welcome

    logout:
      after:
        default_browser_return_url: http://127.0.0.1:4455/login

    login:
      ui_url: http://127.0.0.1:4455/login
      lifespan: 10m

    registration:
      lifespan: 10m
      ui_url: http://127.0.0.1:4455/registration
      after:
        password:
          hooks:
            - hook: session
            - hook: show_verification_ui
        oidc:
          hooks:
            - hook: session

log:
  level: debug
  format: text
  leak_sensitive_values: true

secrets:
  cookie:
    - PLEASE-CHANGE-ME-I-AM-VERY-INSECURE
  cipher:
    - 32-LONG-SECRET-NOT-SECURE-AT-ALL

ciphers:
  algorithm: xchacha20-poly1305

hashers:
  algorithm: bcrypt
  bcrypt:
    cost: 8

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

courier:
  smtp:
    connection_uri: smtps://test:test@mailslurper:1025/?skip_ssl_verify=true

feature_flags:
  use_continue_with_transitions: true
