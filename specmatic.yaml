# Specmatic Configuration for Ory Kratos
# https://specmatic.io/documentation
# This file configures Specmatic contract testing against the Kratos OpenAPI spec.

version: 3

systemUnderTest:
  service:
    $ref: "#/components/services/kratosIdentityApi"
    runOptions:
      $ref: "#/components/runOptions/kratosTest"

components:
  sources:
    kratosLocalSpec:
      filesystem:
        directory: "."

  services:
    kratosIdentityApi:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/kratosLocalSpec"
            specs:
              - spec/api.json

  runOptions:
    kratosTest:
      openapi:
        type: test
        baseUrl: "http://localhost:4433"
